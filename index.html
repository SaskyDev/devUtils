<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>DevUtils - Simple Developer Tools</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>

    <body>

        <h1>DevUtils</h1>

        <p>
        Simple developer tools that run directly in your browser.
        No installs, no complexity.
        </p>

        <h2>Developer Tools</h2>

        <input 
        type="text" 
        id="toolSearch" 
        placeholder="Search tools..."
        onkeyup="filterTools()">

        <ul>
            <li class="tool-item">
                <a href="tools/json-formatter/">JSON Formatter</a>
            </li>

            <li class="tool-item">
                <a href="tools/regex-tester/">Regex Tester</a>
            </li>

            <li class="tool-item">
                <a href="tools/uuid-generator/">UUID Generator</a>
            </li>
            
        </ul>


        <h2>Encoding Tools</h2>

        <ul>
            <li class="tool-item">
                <a href="tools/base64/">Base64 Encoder / Decoder</a>
            </li>
        </ul>


        <h2>Security Tools</h2>

        <ul>
            <li class="tool-item">
                <a href="tools/password-generator/">Password Generator</a>
            </li>
        </ul>


        <footer>

        <p>
        DevUtils — by SaskyDev
        </p>

        </footer>

        <script src="../../js/ui.js"></script>
        <script src="../../js/jsonTools.js"></script>
        <script src="../../js/encodingTools.js"></script>
        <script src="../../js/securityTools.js"></script>
        <script src="../../js/main.js"></script>
        <script src="../../js/regexTools.js"></script>

    </body>

</html>
